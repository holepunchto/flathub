id: io.keet.Keet
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: Keet
separate-locales: false
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --persist=.config/Keet
  - --persist=.config/pear
  - --filesystem=xdg-download
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
modules:
  - name: Keet
    buildsystem: simple
    build-commands:
      - install -Dm644 flatpak/${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 flatpak/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 flatpak/${FLATPAK_ID}.png /app/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm755 flatpak/entrypoint.sh /app/bin/Keet
      - mkdir -p /app/lib/${FLATPAK_ID}
      - cp -r ./Keet-*/* /app/lib/${FLATPAK_ID}
    sources:
      - type: archive
        url: https://github.com/holepunchto/flathub/releases/download/keet_4.15.0/keet_4.15.0_arm64_flatpak.tar.gz
        only-arches:
          - aarch64
        strip-components: 0
        sha512: 77e5099f0cc20d2ad5114f266779da1ec85162ec6f7fc39bd311e790520af57a8d2eee4585a051fb170f0b64c70bc55d616d54e471020bd31282da7fe03988bb
      - type: archive
        url: https://github.com/holepunchto/flathub/releases/download/keet_4.15.0/keet_4.15.0_x64_flatpak.tar.gz
        only-arches:
          - x86_64
        strip-components: 0
        sha512: f00ef537146789e2acf64cad1accf66a84c18a864b4da3bf1fd1a415396a84e82f3d9bb988ad890b089e0cfb34930aaff7ef506d84ac5759abfef5f6f9185983
